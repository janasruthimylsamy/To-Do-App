<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="light">

<div class="container">
  <div class="top">
    <h2>✨ Todo App</h2>
    <div class="toggle" onclick="toggleMode()">🌙</div>
  </div>

  <div class="input-group">
    <input id="taskInput" placeholder="Enter task..." onkeypress="handleEnter(event)">
    <button class="add-btn" onclick="addTask()">Add</button>
  </div>

  <ul id="taskList"></ul>

  <div class="footer" id="count"></div>
</div>

<script src="script.js"></script>
</body>
</html>
